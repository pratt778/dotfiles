backend = "glx";
vsync = true;

# Shadows
shadow = true;
shadow-radius = 7;
shadow-opacity = 0.4;
shadow-offset-x = -7;
shadow-offset-y = -7;

# Fading
fading = false;
fade-in-step = 1.0;
fade-out-step = 1.0;

# Transparency
inactive-opacity = 0.92;
active-opacity = 1.0;
frame-opacity = 1.0;

# Rounded corners
corner-radius = 8;
