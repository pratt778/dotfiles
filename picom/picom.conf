backend = "glx";
vsync = true;

# Shadows
shadow = true;
shadow-radius = 7;
shadow-opacity = 0.4;
shadow-offset-x = -7;
shadow-offset-y = -7;

# Fading
fading = false;
no-fading-openclose = true;
no-fading-destroyed-argb = true;
fade-in-step = 0.03;
fade-out-step = 0.03;

# Transparency
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;

# Rounded corners
corner-radius = 8;
