# Change prefix from Ctrl+B to Ctrl+A (easier)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Mouse support — click between panes
set -g mouse on

# Start windows and panes at 1 not 0
set -g base-index 1
set -g pane-base-index 1

# Split panes
bind -n M-v split-window -h
bind -n M-h split-window -v

# Move between panes with Alt+Arrow
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Resize panes with Ctrl+Arrow
bind -n C-Left resize-pane -L 5
bind -n C-Right resize-pane -R 5
bind -n C-Up resize-pane -U 5
bind -n C-Down resize-pane -D 5

# Status bar
set -g status-position bottom
set -g status-style 'bg=#1a1a2e fg=#b97fff'
set -g status-left '#[fg=#27c93f] #S '
set -g status-right '#[fg=#b97fff] %H:%M '
set -g window-status-current-style 'fg=#ff9944 bold'

# Reload config with r
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"
